<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AAF Auth Bootstrap</title>
  </head>
  <body>
    <script>
      (function () {
        const url = new URL(window.location.href);
        const storage = url.searchParams.get("storage");
        const target = url.searchParams.get("target") || "/";

        try {
          if (storage) {
            localStorage.setItem("auth-storage", storage);
          }
        } catch (error) {
          console.error("failed to seed auth-storage", error);
        }

        window.location.replace(target);
      })();
    </script>
  </body>
</html>
