<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>AAF Auth Scene Driver</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050b17;
      }

      iframe {
        width: 100vw;
        height: 100vh;
        border: 0;
        display: block;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <iframe id="app-frame" title="AAF World"></iframe>
    <script>
      const params = new URLSearchParams(window.location.search);
      const storage = params.get("storage");
      const target = params.get("target");
      const tab = params.get("tab");

      if (storage) {
        localStorage.setItem("auth-storage", storage);
      }

      const frame = document.getElementById("app-frame");

      function normalizeText(text) {
        return String(text || "").replace(/\s+/g, "").trim();
      }

      async function clickTabWhenReady(frameWindow, expectedTab) {
        if (!expectedTab) {
          return;
        }

        const normalizedTarget = normalizeText(expectedTab);
        const deadline = Date.now() + 12000;

        while (Date.now() < deadline) {
          const doc = frameWindow.document;
          const buttons = Array.from(doc.querySelectorAll("button"));
          const found = buttons.find((button) => normalizeText(button.textContent) === normalizedTarget);

          if (found) {
            found.click();
            return;
          }

          await new Promise((resolve) => setTimeout(resolve, 250));
        }
      }

      async function boot() {
        if (!target) {
          document.body.textContent = "Missing target";
          return;
        }

        frame.src = target;

        frame.addEventListener(
          "load",
          async () => {
            try {
              await clickTabWhenReady(frame.contentWindow, tab);
            } catch (error) {
              console.error(error);
            }
          },
          { once: true }
        );
      }

      boot();
    </script>
  </body>
</html>
